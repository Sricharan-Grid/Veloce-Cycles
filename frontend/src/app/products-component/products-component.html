<section class="products">
  <div class="products__headings">
    <h2 class="products__headings--heading heading">Featured Products</h2>
  </div>

  <div class="products__container">
    @for (product of products(); track product.id) {
      <div
        class="products__container--card"
        (click)="this.productPopupService.enablePopup(product.id)"
      >
        <img [src]="product.productImage" [alt]="product.productName" class="product-card__img" />

        <div class="product-card__details">
          <div class="text">
            <p class="brandName product-card__details--name">{{ product.productName }}</p>
            <p class="product-card__details--price">
              <del class="actualprice">&#8377;{{ product.productActualCost }} </del>
              &#8377; {{ product.productDiscountPrice }}
            </p>
          </div>
        </div>
      </div>
    }
  </div>
</section>
