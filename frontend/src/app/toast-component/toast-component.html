<div
  class="toastMessage"
  [class.toast-active]="!isToastClosed()"
  [class.toast-closing]="isToastClosed()"
>
  <div class="toastMessage__img" [innerHTML]="iconChanged()"></div>

  <div class="toastMessage__content">
    <p class="toastMessage__content--heading">{{ headLineChanged() }}</p>
    <p class="toastMessage__content--message">
      {{ messageChanged() }}
    </p>
  </div>
